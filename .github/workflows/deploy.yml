name: deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.2'
        bundler-cache: true
    - name: Install and Build
      run: |
        pip3 install --upgrade nbconvert==7.16.6
        export JEKYLL_ENV=production
        bundle exec jekyll build

  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.2'
        bundler-cache: true
    - name: Install and Build
      run: |
        pip3 install --upgrade nbconvert==7.16.6
        export JEKYLL_ENV=production
        bundle exec jekyll build
    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: _site
